name: Deploy to EC2

on:
  push:
    branches:
      - dev-frontend   # 🚀 Workflow startet automatisch bei Push auf dev-frontend.

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 📥 Repository auschecken
      - name: Repository auschecken
        uses: actions/checkout@v3

      # 🔑 AWS-Zugangsdaten konfigurieren
      - name: AWS Zugangsdaten konfigurieren
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 🚀 Deployment auf EC2
      - name: Deploy auf EC2 via SSM
        run: |
          aws ssm send-command \
            --targets "Key=instanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy AutoDocOrganizer" \
            --parameters 'commands=[
              "cd /home/ubuntu || exit 1",
              "if [ -d AutoDocOrganizer ]; then cd AutoDocOrganizer && git reset --hard && git pull origin dev-frontend; else git clone -b dev-frontend https://github.com/dani-farcas/autoDocOrganizer.git AutoDocOrganizer && cd AutoDocOrganizer; fi",
              "python3 -m venv venv",
              "source venv/bin/activate",
              "pip install --upgrade pip",
              "pip install -r requirements.txt",
              "pkill -f gunicorn || true",
              "nohup venv/bin/gunicorn -b 0.0.0.0:5000 src.app:app > gunicorn.log 2>&1 &"
            ]'
